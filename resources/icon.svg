<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181e25"/>
      <stop offset="1" stop-color="#0a0d10"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- macOS-style rounded square with margin -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#shine)"/>
  <rect x="66" y="66" width="892" height="892" rx="198" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>
  <!-- VT monogram -->
  <g font-family="Menlo, 'SF Mono', monospace" font-weight="bold" text-anchor="middle">
    <text x="400" y="700" font-size="480" fill="#d97757">V</text>
    <text x="668" y="700" font-size="480" fill="#56b6c2">T</text>
  </g>
  <!-- prompt underscore -->
  <rect x="560" y="756" width="220" height="36" rx="10" fill="#e6e3dc" opacity="0.85"/>
</svg>
